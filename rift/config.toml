[keys]
# focus
"Ctrl + H" = { move_focus = "left" }
"Ctrl + L" = { move_focus = "right" }
"Ctrl + K" = { move_focus = "up" }
"Ctrl + J" = { move_focus = "down" }

# move windows
"Ctrl + Shift + H" = { move_node = "left" }
"Ctrl + Shift + L" = { move_node = "right" }
"Ctrl + Shift + K" = { move_node = "up" }
"Ctrl + Shift + J" = { move_node = "down" }

# resize (Ctrl - / Ctrl =)
"Ctrl + Minus" = "resize_window_shrink"
"Ctrl + Equal" = "resize_window_grow"

# floating
"Ctrl + V" = "toggle_window_floating"
"Ctrl + F" = "toggle_focus_floating"

# switch workspace (Ctrl 1-5, 0-based index)
"Ctrl + 1" = { switch_to_workspace = 0 }
"Ctrl + 2" = { switch_to_workspace = 1 }
"Ctrl + 3" = { switch_to_workspace = 2 }
"Ctrl + 4" = { switch_to_workspace = 3 }
"Ctrl + 5" = { switch_to_workspace = 4 }

# move window to workspace (Shift F1-F5, 0-based index)
"Shift + F1" = { move_window_to_workspace = 0 }
"Shift + F2" = { move_window_to_workspace = 1 }
"Shift + F3" = { move_window_to_workspace = 2 }
"Shift + F4" = { move_window_to_workspace = 3 }
"Shift + F5" = { move_window_to_workspace = 4 }

# mission control overview
"Ctrl + M" = "show_mission_control_all"
"Ctrl + Shift + M" = "show_mission_control_current"

# rift
"Meta + Shift + R" = { exec = ["/Users/benjaminderksen/Repos/rift/target/release/rift", "service", "restart"] }

# app launchers (Meta = Cmd on macOS)
"Meta + Shift + T" = { exec = ["open", "-na", "Ghostty"] }
"Meta + Shift + B" = { exec = ["open", "-na", "Brave Browser"] }
"Meta + Shift + E" = { exec = ["/opt/homebrew/bin/code", "--new-window"] }
"Meta + Shift + P" = { exec = ["open", "-na", "KeePassXC"] }
"Meta + Shift + S" = { exec = ["open", "-na", "Spotify"] }
