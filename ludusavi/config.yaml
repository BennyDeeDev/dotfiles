---
runtime:
  threads: ~
release:
  check: true
manifest:
  enable: true
  secondary:
    - url: "https://raw.githubusercontent.com/BennyDeeDev/ludusavi-emudeck-manifest-flatpak/main/manifest.yml"
      enable: true
language: en-US
theme: dark
roots:
  - store: steam
    path: /home/benjamin/.local/share/Steam
  - store: otherWine
    path: /home/benjamin/.var/app/com.usebottles.bottles/data/bottles/bottles/Games-Exe-Runner-Proton
redirects: []
backup:
  path: /home/benjamin/Backups/ludusavi
  ignoredGames: []
  filter:
    excludeStoreScreenshots: false
    cloud:
      exclude: false
      epic: false
      gog: false
      origin: false
      steam: false
      uplay: false
    ignoredPaths: []
    ignoredRegistry: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  retention:
    full: 40
    differential: 0
  format:
    chosen: zip
    zip:
      compression: deflate
    compression:
      deflate:
        level: 6
      bzip2:
        level: 6
      zstd:
        level: 10
  onlyConstructive: false
restore:
  path: /home/benjamin/Backups/ludusavi
  ignoredGames: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  reverseRedirects: false
scan:
  showDeselectedGames: true
  showUnchangedGames: true
  showUnscannedGames: true
cloud:
  remote:
    Smb:
      id: ludusavi-1759601223
      host: 192.168.178.254
      port: 445
      username: benjamin
  path: /Ludusavi/ludusavi-backup
  synchronize: true
apps:
  rclone:
    path: rclone
    arguments: "--fast-list --ignore-checksum"
customGames: []
